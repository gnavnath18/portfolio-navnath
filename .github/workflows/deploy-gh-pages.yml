name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      # GitHub Pages serves static files only, so this build uses static export.
      # See README.md "GitHub Pages" section: set output: 'export' in next.config.js
      # and remove/replace any features that require a Node server (Formspree fetch
      # still works client-side; the GitHub stats <img> tags also work as static).
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - run: echo "Deployed"
